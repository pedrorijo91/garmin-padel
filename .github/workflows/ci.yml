# CI for Garmin Connect IQ (Monkey C) app
# - Compiles the app for a target device (monkeyc includes type checking with -l 3)
# - Runs unit tests via "Run No Evil" (monkeydo -t)
# Uses matco/connectiq-tester Docker image directly so test output is visible in the log.
# (The GitHub Action pipes output to ::debug:: which is hidden by default.)

name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e HOME=/root \
            ghcr.io/matco/connectiq-tester:latest \
            fenix7 ""

